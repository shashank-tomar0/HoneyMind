<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusCorp | Secure Gateway</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <style>
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      position: relative;
      z-index: 10;
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
      border-radius: 12px;
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
    }
    
    .brand-logo svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: white;
      stroke-width: 2;
    }

    .brand-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: white;
    }

    .brand-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .error-msg {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="glass-panel login-container fade-in">
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1 class="brand-title">NexusCorp Intranet</h1>
      <p class="brand-subtitle">Administrator Access Only</p>
    </div>

    <div id="errorMessage" class="error-msg"></div>

    <form id="loginForm">
      <div class="input-group">
        <label for="username">Corporate ID / Username</label>
        <input type="text" id="username" name="username" required autocomplete="off">
      </div>
      
      <div class="input-group">
        <label for="password">Access Token (Password)</label>
        <input type="password" id="password" name="password" required>
      </div>

      <button type="submit" class="btn-primary" id="loginBtn">
        <span id="btnText">Authenticate</span>
        <span id="btnSpinner" class="spinner" style="display: none;"></span>
      </button>
    </form>

    <div class="footer">
      Unauthorized access is strictly prohibited.<br>All activities are monitored and logged.
    </div>
  </div>

  <script src="js/telemetry.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
